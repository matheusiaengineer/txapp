<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>TXDAPP — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0d12;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
.icon{font-size:64px;margin-bottom:16px}
h1{font-size:20px;font-weight:700;margin-bottom:8px;color:#3ECB8E}
p{font-size:14px;color:#9ca3af;max-width:320px;line-height:1.5;margin-bottom:24px}
.btn{background:#3ECB8E;color:#000;border:none;padding:12px 32px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s}
.btn:hover{background:#2da874}
.tips{margin-top:24px;text-align:left;max-width:320px}
.tips h2{font-size:13px;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.tips li{font-size:13px;color:#9ca3af;margin-bottom:4px;list-style:none}
.tips li::before{content:"\2022";color:#3ECB8E;margin-right:8px}
</style>
</head>
<body>
<div class="icon">📡</div>
<h1>Sem conexão</h1>
<p>Você está offline no momento. Suas corridas e entregas ativas continuam funcionando normalmente.</p>
<button class="btn" onclick="window.location.reload()">Tentar novamente</button>
<div class="tips">
<h2>Enquanto estiver offline</h2>
<ul>
<li>Veja seu histórico de corridas</li>
<li>Consulte preços salvos</li>
<li>Suas notificações serão entregues quando voltar</li>
</ul>
</div>
</body>
</html>
